name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing tag to build and publish
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: Funky-Moose-Release-Forge-macOS
            archive_name: Funky-Moose-Release-Forge-macOS.zip
          - os: windows-latest
            artifact_name: Funky-Moose-Release-Forge-Windows
            archive_name: Funky-Moose-Release-Forge-Windows.zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg on macOS
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install FFmpeg on Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install ffmpeg --yes --no-progress

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Generate build icons
        run: python make_icon.py

      - name: Build standalone package
        run: python -m PyInstaller --clean --noconfirm "FunkyMooseReleaseForge.spec"

      - name: Package macOS release
        if: runner.os == 'macOS'
        run: |
          rm -rf release-assets
          mkdir -p "release-assets/Funky Moose Release Forge macOS"
          cp -R "dist/Funky Moose Release Forge.app" "release-assets/Funky Moose Release Forge macOS/"
          cp "INSTALL_MAC.md" "release-assets/Funky Moose Release Forge macOS/"
          ditto -c -k --sequesterRsrc --keepParent "release-assets/Funky Moose Release Forge macOS" "${{ matrix.archive_name }}"

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (Test-Path release-assets) { Remove-Item -Recurse -Force release-assets }
          New-Item -ItemType Directory -Force -Path "release-assets\Funky Moose Release Forge Windows" | Out-Null
          Copy-Item -Recurse "dist\Funky Moose Release Forge" "release-assets\Funky Moose Release Forge Windows\Funky Moose Release Forge"
          Copy-Item "INSTALL_WINDOWS.md" "release-assets\Funky Moose Release Forge Windows\"
          Compress-Archive -Path "release-assets\Funky Moose Release Forge Windows" -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || inputs.tag_name != ''
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: release-assets/**/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
